name: Clean imported issue references

on:
  push:
    branches: [master]
    paths:
      - .github/workflows/clean-imported-issue-references.yml
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - name: Remove upstream-link text from copied issues
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_REPO: ${{ github.repository }}
        run: |
          python3 <<'PY'
          import json
          import os
          import re
          import time
          import urllib.error
          import urllib.request

          token = os.environ['GH_TOKEN']
          target_repo = os.environ['TARGET_REPO']
          api = 'https://api.github.com'
          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'copied-issue-cleanup',
          }
          marker = re.compile(r'^\[upstream (\d+)\]')

          def request_json(method, url, payload=None, retries=5):
              data = None if payload is None else json.dumps(payload).encode('utf-8')
              req = urllib.request.Request(url, data=data, headers=headers, method=method)
              for attempt in range(retries):
                  try:
                      with urllib.request.urlopen(req, timeout=60) as response:
                          body = response.read().decode('utf-8')
                          return json.loads(body) if body else None
                  except urllib.error.HTTPError as exc:
                      body = exc.read().decode('utf-8', 'replace')
                      if exc.code in (403, 429) and attempt < retries - 1:
                          wait = 60 * (attempt + 1)
                          print(f'rate limited; waiting {wait}s: {body[:200]}')
                          time.sleep(wait)
                          continue
                      raise RuntimeError(f'{method} {url} failed: {exc.code} {body}') from exc

          def paged(url):
              page = 1
              while True:
                  sep = '&' if '?' in url else '?'
                  batch = request_json('GET', f'{url}{sep}per_page=100&page={page}')
                  if not batch:
                      break
                  yield from batch
                  if len(batch) < 100:
                      break
                  page += 1

          updated = 0
          skipped = 0
          for issue in paged(f'{api}/repos/{target_repo}/issues?state=open'):
              if 'pull_request' in issue:
                  continue
              title = issue.get('title') or ''
              match = marker.match(title)
              if not match:
                  continue
              number = match.group(1)
              body = issue.get('body') or ''
              new_body = (
                  f'Imported tracking copy of source issue {number}.\n\n'
                  f'Original title: {title}\n\n'
                  'This issue was created in this fork as an open tracking copy. '
                  'No comments or writes were made outside this repository.'
              )
              if body == new_body:
                  skipped += 1
                  continue
              request_json('PATCH', f'{api}/repos/{target_repo}/issues/{issue["number"]}', {'body': new_body})
              updated += 1
              print(f'updated issue {issue["number"]}')
              time.sleep(0.75)
          print(f'done: updated={updated} skipped={skipped}')
          PY
