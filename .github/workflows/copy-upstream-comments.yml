name: Copy upstream issue comments

on:
  push:
    branches: [master]
    paths:
      - .github/workflows/copy-upstream-comments.yml
  workflow_dispatch:

concurrency:
  group: copy-upstream-comments
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  stopped:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Comment copy stopped."
